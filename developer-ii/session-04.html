<h1 id="%E0%B8%84%E0%B8%B2%E0%B8%9A-4--snake-3">คาบ 4 — Snake #3</h1>
<h2 id="%E0%B9%83%E0%B8%AA%E0%B9%88-%E0%B9%80%E0%B8%9B%E0%B9%89%E0%B8%B2%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%A2-%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B9%80%E0%B8%81%E0%B8%A1-%E0%B8%AD%E0%B8%B2%E0%B8%AB%E0%B8%B2%E0%B8%A3--%E0%B8%81%E0%B8%B4%E0%B8%99%E0%B9%81%E0%B8%A5%E0%B9%89%E0%B8%A7%E0%B9%82%E0%B8%95--%E0%B8%84%E0%B8%B0%E0%B9%81%E0%B8%99%E0%B8%99--%E0%B9%80%E0%B8%AA%E0%B8%B5%E0%B8%A2%E0%B8%87">ใส่ &quot;เป้าหมาย&quot; ให้เกม: อาหาร · กินแล้วโต · คะแนน · เสียง</h2>
<p><strong>Fundamental of Embedded Systems Developer II · คาบ 4 / 13</strong> · 3 คน / 1 บอร์ด</p>
<p>คาบที่แล้วงูของเราเดินและเลี้ยวได้แล้ว แต่ยังไม่มีอะไรให้ทำ<br />
คาบนี้เราจะใส่เป้าหมายเข้าไป: วางอาหารแบบสุ่ม งูกินแล้วโต ได้คะแนน และมีเสียง &quot;งับ!&quot; ตอนกิน</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="cover" data-theme="default" lang="en-US" class="cover" data-marpit-pagination="1" style="" data-marpit-pagination-total="19" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="2" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B9%80%E0%B8%9B%E0%B9%89%E0%B8%B2%E0%B8%AB%E0%B8%A1%E0%B8%B2%E0%B8%A2%E0%B8%84%E0%B8%B2%E0%B8%9A%E0%B8%99%E0%B8%B5%E0%B9%89-mvp">เป้าหมายคาบนี้ (MVP)</h2>
<p>งูเดิน → งับช่องสว่าง → ยาวขึ้น 1 ปล้อง พร้อม Score ขยับและเสียง &quot;eat&quot; → อาหารสุ่มไปโผล่ช่องใหม่</p>
<svg viewBox="0 0 760 64" width="760" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">

<blockquote>
<p>พอถึงตรงนี้เกมของเราจะเริ่มรู้สึกเหมือนเกมจริงแล้ว<br />

<h2 id="%E0%B9%80%E0%B8%81%E0%B8%A3%E0%B9%87%E0%B8%94--snake-%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%97%E0%B8%B8%E0%B8%81%E0%B8%84%E0%B8%99%E0%B9%80%E0%B8%84%E0%B8%A2%E0%B9%80%E0%B8%A5%E0%B9%88%E0%B8%99-%E0%B9%80%E0%B8%81%E0%B8%B4%E0%B8%94%E0%B8%9A%E0%B8%99%E0%B8%A1%E0%B8%B7%E0%B8%AD%E0%B8%96%E0%B8%B7%E0%B8%AD%E0%B9%80%E0%B8%84%E0%B8%A3%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%87%E0%B8%99%E0%B8%B5%E0%B9%89">เกร็ด — Snake ที่ทุกคนเคยเล่น เกิดบนมือถือเครื่องนี้</h2>
<div style="display:flex;gap:24px;align-items:center">
<div style="flex:1;font-size:0.95em">
<p>ปี 1997 Nokia ใส่เกม Snake ลงในมือถือ และ <strong>Nokia 3310</strong> (ปี 2000) ทำให้มันดังไปทั้งโลก<br />
จอขาวดำ ปุ่มไม่กี่ปุ่ม หน่วยความจำนิดเดียว แต่สนุกได้เพราะกติกาเรียบง่าย</p>
<p>หัวใจของเกมนั้นคือสิ่งที่เรากำลังเขียนเป๊ะ ๆ:</p>
<ul>
<li>งูคือ <strong>list ของช่อง</strong> หัวอยู่หน้า หางอยู่ท้าย</li>
<li>กินอาหาร = <strong>ต่อหัว ไม่ตัดหาง</strong> -&gt; ยาวขึ้น</li>
<li>อาหารโผล่ช่องว่างแบบ <strong>สุ่ม</strong></li>
</ul>
<p>เครื่องเล็กแรงน้อยทำเกมที่คนจำได้ทั้งรุ่น เพราะตรรกะคิดมาดี ไม่ใช่เพราะฮาร์ดแวร์แรง — บอร์ดในมือเราวันนี้แรงกว่ามันหลายร้อยเท่า</p>
</div>

<h2 id="%E0%B8%AA%E0%B8%B4%E0%B9%88%E0%B8%87%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B8%88%E0%B8%B0%E0%B9%84%E0%B8%94%E0%B9%89%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99-4-%E0%B9%81%E0%B8%99%E0%B8%A7%E0%B8%84%E0%B8%B4%E0%B8%94%E0%B9%80%E0%B8%A5%E0%B9%87%E0%B8%81">สิ่งที่จะได้เรียน (4 แนวคิดเล็ก)</h2>
<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:0.9em">
<div style="flex:1;min-width:230px;border:2px solid #4caf50;border-radius:10px;padding:10px">
<svg width="56" height="22" viewBox="0 0 56 22" style="vertical-align:middle"><rect x="2" y="6" width="10" height="10" rx="2" fill="#aed581" stroke="#558b2f" /><rect x="13" y="6" width="10" height="10" rx="2" fill="#7cb342" stroke="#558b2f" /><rect x="24" y="6" width="10" height="10" rx="2" fill="#7cb342" stroke="#558b2f" /><rect x="35" y="6" width="10" height="10" rx="2" fill="#7cb342" stroke="#558b2f" /><text x="47" y="15" font-size="13" fill="#2e7d32">+1</text></svg>
<b>1. กินแล้วโต</b><br />เดิน = เติมหัว+ตัดหาง · กิน = เติมหัว <b>ไม่</b>ตัดหาง
</div>
<div style="flex:1;min-width:230px;border:2px solid #2196f3;border-radius:10px;padding:10px">
<svg width="56" height="22" viewBox="0 0 56 22" style="vertical-align:middle"><g stroke="#90caf9" fill="none"><rect x="2" y="2" width="9" height="9" /><rect x="11" y="2" width="9" height="9" /><rect x="2" y="11" width="9" height="9" /><rect x="11" y="11" width="9" height="9" /></g><path d="M22 11 H30" stroke="#1565c0" marker-end="url(#ar4)" /><rect x="32" y="4" width="14" height="14" rx="2" fill="#bbdefb" stroke="#1565c0" /><defs><marker id="ar4" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#1565c0" /></marker></defs></svg>
<b>2. กริด / พิกเซล</b><br />เก็บอาหารเป็น "ช่อง" <code>[col,row]</code> แล้วคูณตอนวาด
</div>
<div style="flex:1;min-width:230px;border:2px solid #ff9800;border-radius:10px;padding:10px">
<svg width="56" height="22" viewBox="0 0 56 22" style="vertical-align:middle"><path d="M28 4 a7 7 0 1 1 -5 2" fill="none" stroke="#ef6c00" stroke-width="2.4" marker-end="url(#lo4)" /><circle cx="40" cy="11" r="3" fill="#ffcc80" /><defs><marker id="lo4" markerWidth="7" markerHeight="7" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef6c00" /></marker></defs></svg>
<b>3. สุ่มจนกว่าจะว่าง</b><br /><code>while True</code> สุ่มช่องใหม่ถ้าทับตัวงู
</div>
<div style="flex:1;min-width:230px;border:2px solid #9c27b0;border-radius:10px;padding:10px">
<svg width="56" height="22" viewBox="0 0 56 22" style="vertical-align:middle"><path d="M4 11 h6 l5 -6 v12 l-5 -6" fill="#ce93d8" stroke="#6a1b9a" stroke-width="1.2" /><path d="M24 6 a6 6 0 0 1 0 10 M30 3 a10 10 0 0 1 0 16" fill="none" stroke="#9c27b0" stroke-width="1.8" /></svg>
<b>4. เรียก verb ใหม่ของ engine</b><br /><code>game.sfx("eat")</code> + <code>score_text.set()</code>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B8%AB%E0%B8%B1%E0%B8%A7%E0%B9%83%E0%B8%88%E0%B8%82%E0%B8%AD%E0%B8%87%E0%B8%84%E0%B8%B2%E0%B8%9A%E0%B8%99%E0%B8%B5%E0%B9%89-%E0%B9%82%E0%B8%95--%E0%B9%80%E0%B8%94%E0%B8%B4%E0%B8%99-%E2%88%92-%E0%B8%95%E0%B8%B1%E0%B8%94%E0%B8%AB%E0%B8%B2%E0%B8%87">หัวใจของคาบนี้: &quot;โต = เดิน − ตัดหาง&quot;</h2>

</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8019em;"></span><span class="mord mathnormal" style="margin-right:0.0197em;">l</span><span class="mord mathnormal">e</span><span class="mord"><span class="mord mathnormal">n</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.8019em;"><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7778em;vertical-align:-0.0833em;"></span><span class="mord mathnormal" style="margin-right:0.0197em;">l</span><span class="mord mathnormal">e</span><span class="mord mathnormal">n</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord">1</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mopen">(</span><span class="mord text"><span class="mord brahmic_fallback">เมื่อกิน</span></span><span class="mclose">)</span></span></span></span></span></p></div>

<h2 id="%E0%B8%97%E0%B8%B5%E0%B8%A1%E0%B9%80%E0%B8%A3%E0%B8%B2%E0%B9%80%E0%B8%82%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B9%81%E0%B8%84%E0%B9%88-%E0%B8%95%E0%B8%A3%E0%B8%A3%E0%B8%81%E0%B8%B0--%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%A7%E0%B8%B2%E0%B8%94%E0%B9%80%E0%B8%AA%E0%B8%B5%E0%B8%A2%E0%B8%87%E0%B9%80%E0%B8%9B%E0%B9%87%E0%B8%99%E0%B8%82%E0%B8%AD%E0%B8%87-engine">ทีมเราเขียนแค่ &quot;ตรรกะ&quot; — การวาด/เสียงเป็นของ engine</h2>

  <text x="141" y="66" text-anchor="middle" font-size="13" fill="#1b5e20">(ตรรกะของเกม)</text>
  <text x="141" y="96"  text-anchor="middle" font-size="13">สุ่มอาหาร · เช็คกิน</text>

<p>คาบนี้เราเขียนแต่ตรรกะของเกม ส่วนการวาดและเสียงเป็นหน้าที่ของ engine ที่เราเรียกใช้ผ่าน <code>bentogame</code></p>
<blockquote>
<p>ไฟล์ที่เราแก้คาบนี้: <a class="pc-gh-link" href="https://github.com/Advance-Innovation-Centre-AIC/embedded-systems-for-developer/blob/main/developer-ii/practise_codes/snake_step3.py" target="_blank" rel="noopener" title="เปิดไฟล์บน GitHub (แท็บใหม่)" style="text-decoration:none"><code>practise_codes/snake_step3.py</code><sup style="color:#22d3ee;font-weight:800">&#8599;</sup></a> (โครงเว้นช่อง 30% ให้เติมเอง)<br />
ถ้าติดจริง ๆ ยกมือถามได้เลย — เดี๋ยวเฉลยพร้อมกันในห้อง</p>
</blockquote>

<h2 id="%E0%B8%82%E0%B8%B1%E0%B9%89%E0%B8%99-1--%E0%B9%80%E0%B8%9E%E0%B8%B4%E0%B9%88%E0%B8%A1-%E0%B8%AD%E0%B8%B2%E0%B8%AB%E0%B8%B2%E0%B8%A3--%E0%B8%9B%E0%B9%89%E0%B8%B2%E0%B8%A2%E0%B8%84%E0%B8%B0%E0%B9%81%E0%B8%99%E0%B8%99-%E0%B8%AA%E0%B8%A3%E0%B9%89%E0%B8%B2%E0%B8%87%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B9%89%E0%B8%87%E0%B9%80%E0%B8%94%E0%B8%B5%E0%B8%A2%E0%B8%A7">ขั้น 1 — เพิ่ม &quot;อาหาร&quot; + &quot;ป้ายคะแนน&quot; (สร้างครั้งเดียว)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">import</span> bentogame <span class="hljs-keyword">as</span> game
    <span class="hljs-keyword">import</span> random                              <span class="hljs-comment"># ใหม่: ไว้สุ่มช่องอาหาร</span>

    food_square = game.Box(<span class="hljs-number">0</span>, <span class="hljs-number">0</span>, CELL_PX - <span class="hljs-number">2</span>, CELL_PX - <span class="hljs-number">2</span>, game.GB_LIGHTEST)  <span class="hljs-comment"># อาหาร = ช่องสว่างสุด</span>
    score_text  = game.Text(<span class="hljs-string">&quot;Score: 0&quot;</span>, <span class="hljs-number">10</span>, <span class="hljs-number">8</span>, game.WHITE)
    step_col, step_row, score = <span class="hljs-number">1</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>        <span class="hljs-comment"># +score = state ใหม่ของคาบนี้</span>
</code></pre>
<svg viewBox="0 0 480 70" width="560">
<rect x="0" y="0" width="480" height="70" fill="#1b1b1b" rx="6" />

<text x="360" y="20" fill="#aaa" font-size="11">อาหาร (สว่างสุด)</text>
<rect x="60" y="30" width="24" height="24" fill="#cddc39" stroke="#888" />
<rect x="86" y="30" width="24" height="24" fill="#7cb342" stroke="#888" />

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B8%82%E0%B8%B1%E0%B9%89%E0%B8%99-2--%E0%B8%AA%E0%B8%B8%E0%B9%88%E0%B8%A1%E0%B8%AD%E0%B8%B2%E0%B8%AB%E0%B8%B2%E0%B8%A3-%E0%B8%AA%E0%B8%B8%E0%B9%88%E0%B8%A1-%E0%B8%8A%E0%B9%88%E0%B8%AD%E0%B8%87-%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B9%83%E0%B8%8A%E0%B9%88%E0%B8%9E%E0%B8%B4%E0%B8%81%E0%B9%80%E0%B8%8B%E0%B8%A5">ขั้น 2 — สุ่มอาหาร (สุ่ม &quot;ช่อง&quot; ไม่ใช่พิกเซล)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    <span class="hljs-keyword">def</span> <span class="hljs-title function_">place_food_at_random_empty_cell</span>():
        <span class="hljs-keyword">while</span> <span class="hljs-literal">True</span>:
            col = random.randint(<span class="hljs-number">0</span>, GRID_COLS - <span class="hljs-number">1</span>)     <span class="hljs-comment"># สุ่ม &quot;ช่อง&quot;</span>
            row = random.randint(<span class="hljs-number">0</span>, GRID_ROWS - <span class="hljs-number">1</span>)
            <span class="hljs-keyword">if</span> [col, row] <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> snake_body:           <span class="hljs-comment"># ห้ามทับตัวงู -&gt; สุ่มใหม่</span>
                food_square.move_to(col * CELL_PX, row * CELL_PX)  <span class="hljs-comment"># ช่อง -&gt; พิกเซล</span>
                <span class="hljs-keyword">return</span>
</code></pre>
<p>แปลงหน่วยกริด → พิกเซลตอนวาด:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>x</mi><mrow><mi>p</mi><mi>x</mi></mrow></msub><mo>=</mo><mi>c</mi><mi>o</mi><mi>l</mi><mo>×</mo><mtext>CELL_PX</mtext><mspace width="2em"/><msub><mi>y</mi><mrow><mi>p</mi><mi>x</mi></mrow></msub><mo>=</mo><mi>r</mi><mi>o</mi><mi>w</mi><mo>×</mo><mtext>CELL_PX</mtext></mrow><annotation encoding="application/x-tex">x_{px} = col \times \text{CELL\_PX} \qquad y_{px} = row \times \text{CELL\_PX}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7167em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal">x</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">p</span><span class="mord mathnormal mtight">x</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7778em;vertical-align:-0.0833em;"></span><span class="mord mathnormal">co</span><span class="mord mathnormal" style="margin-right:0.0197em;">l</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.9933em;vertical-align:-0.31em;"></span><span class="mord text"><span class="mord">CELL_PX</span></span><span class="mspace" style="margin-right:2em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0359em;">y</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">p</span><span class="mord mathnormal mtight">x</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6667em;vertical-align:-0.0833em;"></span><span class="mord mathnormal" style="margin-right:0.0278em;">r</span><span class="mord mathnormal">o</span><span class="mord mathnormal" style="margin-right:0.0269em;">w</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.9933em;vertical-align:-0.31em;"></span><span class="mord text"><span class="mord">CELL_PX</span></span></span></span></span></span></p><p><img src="img/grid_to_pixel.png" alt="" style="width:660px;" /></p>
<p>เราคิดและเก็บทุกอย่างเป็น &quot;ช่อง&quot; <code>[col,row]</code> (ตัวเลขเล็ก ๆ นับง่าย) แล้ว <strong>คูณ <code>CELL_PX</code> ตอนวาด</strong> เพื่อบอก engine ว่าจะวางกล่องที่พิกเซลไหนบนจอ — แยกสองโลกนี้ออกจากกันคือหัวใจของ coordinate transform ในเอนจินเกมทุกตัว</p>
<blockquote>
<p><code>while True</code> คู่กับ <code>return</code> คือสำนวน &quot;ลองสุ่มไปเรื่อย ๆ จนกว่าจะได้ช่องที่ว่างจริง&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B8%AA%E0%B8%B8%E0%B9%88%E0%B8%A1%E0%B8%88%E0%B8%99%E0%B8%81%E0%B8%A7%E0%B9%88%E0%B8%B2%E0%B8%88%E0%B8%B0%E0%B8%A7%E0%B9%88%E0%B8%B2%E0%B8%87-%E0%B8%97%E0%B8%B3%E0%B8%87%E0%B8%B2%E0%B8%99%E0%B8%A2%E0%B8%B1%E0%B8%87%E0%B9%84%E0%B8%87--%E0%B9%81%E0%B8%9E%E0%B8%87%E0%B9%84%E0%B8%AB%E0%B8%A1">&quot;สุ่มจนกว่าจะว่าง&quot; ทำงานยังไง + แพงไหม</h2>
<p>วิธีนี้มีชื่อในวิชา algorithm ว่า <strong>rejection sampling</strong>: สุ่มมั่ว ๆ แล้ว &quot;ทิ้ง&quot; ตัวที่ไม่ผ่านเงื่อนไข</p>
<p><img src="img/food_spawn.gif" alt="" style="width:520px;" /></p>
<p>ทุกครั้งที่สุ่มได้ช่องที่ทับตัวงู เงื่อนไข <code>if [col,row] not in snake_body:</code> เป็นเท็จ เราก็วน <code>while True</code> สุ่มใหม่ จนกว่าจะเจอช่องว่างจริงแล้วค่อย <code>return</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B8%96%E0%B9%89%E0%B8%B2%E0%B8%81%E0%B8%A3%E0%B8%B0%E0%B8%94%E0%B8%B2%E0%B8%99%E0%B9%80%E0%B8%A3%E0%B8%B4%E0%B9%88%E0%B8%A1%E0%B9%81%E0%B8%99%E0%B9%88%E0%B8%99-%E0%B8%88%E0%B8%B0%E0%B8%AA%E0%B8%B8%E0%B9%88%E0%B8%A1%E0%B8%81%E0%B8%B5%E0%B9%88%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B9%89%E0%B8%87">ถ้ากระดานเริ่มแน่น จะสุ่มกี่ครั้ง</h2>
<p>ถ้า <strong>f</strong> = สัดส่วนช่องที่ไม่ว่าง (งูยาวขึ้น f ก็โตขึ้น) จำนวนครั้งที่คาดว่าต้องสุ่มคือ</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>E</mi><mo>=</mo><mfrac><mn>1</mn><mrow><mn>1</mn><mo>−</mo><mi>f</mi></mrow></mfrac></mrow><annotation encoding="application/x-tex">E = \frac{1}{1 - f}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.0576em;">E</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.2019em;vertical-align:-0.8804em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3214em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mord mathnormal" style="margin-right:0.1076em;">f</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.8804em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span></span></span></span></span></p><div style="display:flex;gap:18px;align-items:center">
<div style="flex:0 0 430px">
<p><img src="img/rejection_cost.png" alt="" style="width:430px;" /></p>
</div>
<div style="flex:1;font-size:0.9em">
<p>อ่านกราฟง่าย ๆ:</p>
<ul>
<li>งูสั้น (กระดานว่างเกือบหมด) -&gt; สุ่ม <strong>ครั้งเดียว</strong> ก็ติด</li>
<li>เต็มครึ่งกระดาน -&gt; เฉลี่ย <strong>2 ครั้ง</strong></li>
<li>เต็ม 90% -&gt; เฉลี่ย <strong>10 ครั้ง</strong> เริ่มแพงขึ้นชัด</li>
</ul>
<p>ในเกมจริง Snake ของเรากระดานไม่เคยเต็มขนาดนั้น วิธีนี้จึง <strong>เร็วพอและเขียนง่าย</strong> เหมาะกับงานบนบอร์ด</p>
</div>
</div>
<blockquote>
<p>บทเรียน algorithm: วิธีที่ &quot;ไม่สมบูรณ์แบบทางทฤษฎี&quot; แต่ <strong>เข้าใจง่ายและเร็วพอกับงานจริง</strong> มักเป็นทางเลือกที่ดีที่สุดบน MCU</p>
</blockquote>
<div id="rejsim" style="font-size:0.62em;background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px;margin-top:6px;color:#e6edf3">
<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
<span>กระดานเต็ม <b>f</b> =</span>
<input id="rjf" type="range" min="0" max="95" value="50" style="flex:1;min-width:180px" />
<b id="rjfv" style="color:#19c8ff;min-width:46px">50%</b>
<span>คาดว่าสุ่ม <b id="rje" style="color:#7ee787">E = 2.0</b> ครั้ง</span>
<button id="rjroll" style="background:#4a90d9;color:#fff;border:0;border-radius:8px;padding:5px 14px;cursor:pointer">▶ ลองสุ่มจริง</button>
</div>
<div style="display:flex;gap:14px;align-items:center">
<canvas id="rjcv" style="width:62%;height:150px;background:#0d1117;border:1px solid #21262d;border-radius:6px"></canvas>
<div style="flex:1">
<div style="color:#8b949e;margin-bottom:4px">สุ่มจนกว่าจะเจอช่องว่าง (rejection):</div>
<div id="rjdice" style="font-family:monospace;font-size:1.5em;letter-spacing:2px;min-height:1.6em">—</div>
<div id="rjcount" style="margin-top:4px">กดปุ่มเพื่อโยน — แต่ละ ✗ คือสุ่มโดนช่องที่มีงู ต้องสุ่มใหม่</div>
</div>
</div>
</div>
<script>
(function(){
var box=document.getElementById('rejsim'); if(!box||box.dataset.i)return; box.dataset.i=1;
var sl=document.getElementById('rjf'),cv=document.getElementById('rjcv');
function E(f){return 1/(1-f);}
function curve(){
 var dpr=window.devicePixelRatio||1,W=cv.clientWidth||440,H=150; cv.width=W*dpr; cv.height=H*dpr;
 var ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,W,H);
 var pad=26,x0=pad,x1=W-8,y0=H-20,y1=8,Emax=12;
 ctx.strokeStyle='#21262d'; ctx.lineWidth=1;
 [1,2,4,8,12].forEach(function(e){var y=y0-(e/Emax)*(y0-y1); ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x1,y);ctx.stroke(); ctx.fillStyle='#8b949e';ctx.font='10px sans-serif';ctx.fillText(e+'x',4,y+3);});
 ctx.strokeStyle='#79c0ff'; ctx.lineWidth=2; ctx.beginPath();
 for(var i=0;i<=95;i++){var f=i/100,e=Math.min(E(f),Emax),x=x0+(i/95)*(x1-x0),y=y0-(e/Emax)*(y0-y1); i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
 var f=(+sl.value)/100,e=Math.min(E(f),Emax),mx=x0+((+sl.value)/95)*(x1-x0),my=y0-(e/Emax)*(y0-y1);
 ctx.fillStyle='#7ee787'; ctx.beginPath(); ctx.arc(mx,my,5,0,7); ctx.fill();
 ctx.strokeStyle='#7ee787'; ctx.setLineDash([3,3]); ctx.beginPath(); ctx.moveTo(mx,y0); ctx.lineTo(mx,my); ctx.stroke(); ctx.setLineDash([]);
 ctx.fillStyle='#8b949e'; ctx.font='11px sans-serif'; ctx.fillText('f →',x1-26,y0+15); ctx.fillText('E ↑',x0-20,y1+10);}
function upd(){var f=(+sl.value)/100; document.getElementById('rjfv').textContent=(+sl.value)+'%'; document.getElementById('rje').textContent='E = '+E(f).toFixed(1); curve();}
sl.addEventListener('input',upd);
document.getElementById('rjroll').addEventListener('click',function(){
 var f=(+sl.value)/100,seq='',n=0,timer=setInterval(function(){
  n++; var hit=Math.random()>=f; seq+=hit?'✓':'✗ '; document.getElementById('rjdice').innerHTML=seq;
  if(hit||n>=40){clearInterval(timer); document.getElementById('rjcount').innerHTML='สุ่ม <b style="color:#7ee787">'+n+'</b> ครั้งจึงเจอช่องว่าง · ทฤษฎีคาด ~'+E(f).toFixed(1)+' ครั้ง';}
 },180);
});
function init(){upd();}
if(document.readyState!=='loading'){init();}else{window.addEventListener('load',init);}
window.addEventListener('resize',function(){setTimeout(curve,120);});
})();
</script>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B8%82%E0%B8%B1%E0%B9%89%E0%B8%99-3--%E0%B8%AA%E0%B8%A1%E0%B8%AD%E0%B8%87%E0%B8%87%E0%B8%B9-%E0%B9%80%E0%B8%8A%E0%B9%87%E0%B8%84%E0%B8%81%E0%B8%B4%E0%B8%99-%E2%86%92-%E0%B9%82%E0%B8%95-%E2%86%92-%E0%B8%84%E0%B8%B0%E0%B9%81%E0%B8%99%E0%B8%99-%E2%86%92-%E0%B9%80%E0%B8%AA%E0%B8%B5%E0%B8%A2%E0%B8%87">ขั้น 3 — สมองงู: เช็คกิน → โต → คะแนน → เสียง</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">    next_head = [snake_body[<span class="hljs-number">0</span>][<span class="hljs-number">0</span>] + step_col, snake_body[<span class="hljs-number">0</span>][<span class="hljs-number">1</span>] + step_row]
    snake_body.insert(<span class="hljs-number">0</span>, next_head)                <span class="hljs-comment"># เติมหัวใหม่เสมอ</span>

    ate_food = (next_head == [food_square.x // CELL_PX, food_square.y // CELL_PX])
    <span class="hljs-keyword">if</span> ate_food:                                   <span class="hljs-comment"># งูกินอาหารเข้า</span>
        score += <span class="hljs-number">1</span>
        game.sfx(<span class="hljs-string">&quot;eat&quot;</span>)                            <span class="hljs-comment"># เสียงงับ มาจาก engine จริง</span>
        score_text.<span class="hljs-built_in">set</span>(<span class="hljs-string">&quot;Score: %d&quot;</span> % score)
        body_squares.append(game.Box(<span class="hljs-number">0</span>, <span class="hljs-number">0</span>, CELL_PX - <span class="hljs-number">2</span>, CELL_PX - <span class="hljs-number">2</span>, game.GB_DARK))  <span class="hljs-comment"># โต 1 ปล้อง</span>
        game.Text(<span class="hljs-string">&quot;Nice bite!&quot;</span>, <span class="hljs-number">320</span>, <span class="hljs-number">180</span>, game.GB_LIGHT)
        place_food_at_random_empty_cell()
    <span class="hljs-keyword">else</span>:
        snake_body.pop()                           <span class="hljs-comment"># ไม่กิน -&gt; ตัดหาง = เดินปกติ</span>
</code></pre>
<p>ผลต่อความยาวงูในแต่ละเฟรม สรุปเป็นเงื่อนไขเดียว:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>l</mi><mi>e</mi><msup><mi>n</mi><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msup><mo>=</mo><mrow><mo fence="true">{</mo><mtable rowspacing="0.36em" columnalign="left left" columnspacing="1em"><mtr><mtd><mstyle scriptlevel="0" displaystyle="false"><mrow><mi>l</mi><mi>e</mi><mi>n</mi><mo>+</mo><mn>1</mn></mrow></mstyle></mtd><mtd><mstyle scriptlevel="0" displaystyle="false"><mtext>ถ้ากิน (insert หัว, ไม่ pop)</mtext></mstyle></mtd></mtr><mtr><mtd><mstyle scriptlevel="0" displaystyle="false"><mrow><mi>l</mi><mi>e</mi><mi>n</mi></mrow></mstyle></mtd><mtd><mstyle scriptlevel="0" displaystyle="false"><mtext>ถ้าไม่กิน (insert หัว + pop หาง)</mtext></mstyle></mtd></mtr></mtable></mrow></mrow><annotation encoding="application/x-tex">len&#x27; = \begin{cases} len + 1 &amp; \text{ถ้ากิน (insert หัว, ไม่ pop)} \\ len &amp; \text{ถ้าไม่กิน (insert หัว + pop หาง)} \end{cases}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8019em;"></span><span class="mord mathnormal" style="margin-right:0.0197em;">l</span><span class="mord mathnormal">e</span><span class="mord"><span class="mord mathnormal">n</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.8019em;"><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:3em;vertical-align:-1.25em;"></span><span class="minner"><span class="mopen delimcenter" style="top:0em;"><span class="delimsizing size4">{</span></span><span class="mord"><span class="mtable"><span class="col-align-l"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.69em;"><span style="top:-3.69em;"><span class="pstrut" style="height:3.008em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0197em;">l</span><span class="mord mathnormal">e</span><span class="mord mathnormal">n</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mord">1</span></span></span><span style="top:-2.25em;"><span class="pstrut" style="height:3.008em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0197em;">l</span><span class="mord mathnormal">e</span><span class="mord mathnormal">n</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:1.19em;"><span></span></span></span></span></span><span class="arraycolsep" style="width:1em;"></span><span class="col-align-l"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.69em;"><span style="top:-3.69em;"><span class="pstrut" style="height:3.008em;"></span><span class="mord"><span class="mord text"><span class="mord brahmic_fallback">ถ้ากิน</span><span class="mord"> (insert </span><span class="mord brahmic_fallback">หัว</span><span class="mord">, </span><span class="mord brahmic_fallback">ไม่</span><span class="mord"> pop)</span></span></span></span><span style="top:-2.25em;"><span class="pstrut" style="height:3.008em;"></span><span class="mord"><span class="mord text"><span class="mord brahmic_fallback">ถ้าไม่กิน</span><span class="mord"> (insert </span><span class="mord brahmic_fallback">หัว</span><span class="mord"> + pop </span><span class="mord brahmic_fallback">หาง</span><span class="mord">)</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:1.19em;"><span></span></span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span></span></span></span></span></p><p><img src="img/snake_brain.png" alt="" style="width:680px;" /></p>
<blockquote>
<p>จุดสำคัญคือ ตอนกินเราไม่เรียก <code>pop()</code> งูจึงยาวขึ้น 1 ปล้อง</p>

<h2 id="%E0%B9%80%E0%B8%8A%E0%B9%87%E0%B8%84%E0%B8%81%E0%B8%B4%E0%B8%99--%E0%B8%AB%E0%B8%B1%E0%B8%A7%E0%B8%87%E0%B8%B9%E0%B8%81%E0%B8%B1%E0%B8%9A%E0%B8%AD%E0%B8%B2%E0%B8%AB%E0%B8%B2%E0%B8%A3-%E0%B8%AD%E0%B8%A2%E0%B8%B9%E0%B9%88%E0%B8%8A%E0%B9%88%E0%B8%AD%E0%B8%87%E0%B9%80%E0%B8%94%E0%B8%B5%E0%B8%A2%E0%B8%A7%E0%B8%81%E0%B8%B1%E0%B8%99">เช็คกิน = หัวงูกับอาหาร &quot;อยู่ช่องเดียวกัน&quot;</h2>

><span class="mord"><span class="mord mathnormal" style="margin-right:0.0269em;">w</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.0269em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.1076em;">f</span><span class="mord mathnormal mtight">oo</span><span class="mord mathnormal mtight">d</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mclose">)</span></span></span></span></span></p><div style="display:flex;gap:24px;align-items:center;margin-top:10px">

<h2 id="%E0%B8%A7%E0%B8%B4%E0%B8%98%E0%B8%B5%E0%B8%A3%E0%B8%B1%E0%B8%99%E0%B8%9A%E0%B8%99%E0%B8%9A%E0%B8%AD%E0%B8%A3%E0%B9%8C%E0%B8%94-program-to-device">วิธีรันบนบอร์ด: Program to Device</h2>
<div style="display:flex;gap:24px;align-items:center">
<div style="flex:1;font-size:0.92em">
<ol>
<li>เปิดไฟล์ <code>snake_step3.py</code> ใน <strong>BENTO IDE</strong></li>

</ol>
<blockquote>
<p>เราไม่ใช้ <code>exec(open(...))</code> ในการรัน — บนบอร์ดให้กด <strong>Program to Device</strong> เสมอ<br />
เสียง <code>game.sfx(&quot;eat&quot;)</code> จะ &quot;ดังจริง&quot; เฉพาะบนบอร์ดเท่านั้น</p>
</blockquote>

<p><img src="img/Bento_IDE_Program_to_Device.png" alt="" style="width:340px;" /></p>
</div>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B8%97%E0%B8%B3%E0%B9%84%E0%B8%A1%E0%B9%80%E0%B8%AA%E0%B8%B5%E0%B8%A2%E0%B8%87-%E0%B8%94%E0%B8%B1%E0%B8%87%E0%B8%88%E0%B8%A3%E0%B8%B4%E0%B8%87-%E0%B9%84%E0%B8%94%E0%B9%89%E0%B9%80%E0%B8%89%E0%B8%9E%E0%B8%B2%E0%B8%B0%E0%B8%9A%E0%B8%99%E0%B8%9A%E0%B8%AD%E0%B8%A3%E0%B9%8C%E0%B8%94">ทำไมเสียง &quot;ดังจริง&quot; ได้เฉพาะบนบอร์ด</h2>
<p><code>game.sfx(&quot;eat&quot;)</code> หนึ่งบรรทัด ถูกแปลงเป็นเสียงจริงด้วยฮาร์ดแวร์หลายชั้น:</p>
<p><img src="img/sfx_chain.png" alt="" style="width:760px;" /></p>
<p>เราสั่งแค่ &quot;ชื่อเสียง&quot; หนึ่งคำ แต่ engine ไปผสม <strong>ตารางตัวอย่างคลื่นเสียง</strong> เป็นตัวเลข PCM แล้วส่งออกทาง <strong>บัส I2S</strong> ไปยังชิป <strong>codec (TLV320DAC3100)</strong> ที่ทำหน้าที่ DAC แปลงเลขเป็นแรงดัน พร้อม amplifier Class-D ในตัวขับลำโพง — บนหน้าจอจำลองไม่มี codec กับลำโพงจริง เสียงจึงเงียบ</p>
<p>เสียงดิจิทัล &quot;วัด&quot; สองแกน — <strong>เวลา</strong> (sample rate) กับ <strong>ระดับ</strong> (จำนวนบิต) — แล้ว DAC แปลงเลขแต่ละตัวเป็นแรงดันออกมาเป็นเส้นตรง:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>f</mi><mi>s</mi></msub><mo>=</mo><mn>48</mn><mtext> kHz</mtext><mtext>  </mtext><mo>⇒</mo><mtext>  </mtext><mi mathvariant="normal">Δ</mi><mi>t</mi><mo>=</mo><mstyle scriptlevel="0" displaystyle="false"><mfrac><mn>1</mn><msub><mi>f</mi><mi>s</mi></msub></mfrac></mstyle><mo>≈</mo><mn>20.8</mn><mtext> </mtext><mi>μ</mi><mi>s</mi><mtext> ต่อ 1 sample</mtext><mspace width="2em"/><msub><mi>V</mi><mrow><mi>o</mi><mi>u</mi><mi>t</mi></mrow></msub><mo>=</mo><mfrac><mtext>code</mtext><mrow><msup><mn>2</mn><mi>N</mi></msup><mo>−</mo><mn>1</mn></mrow></mfrac><mtext> </mtext><msub><mi>V</mi><mrow><mi>F</mi><mi>S</mi></mrow></msub></mrow><annotation encoding="application/x-tex">f_s = 48\text{ kHz} \;\Rightarrow\; \Delta t = \tfrac{1}{f_s} \approx 20.8\,\mu s \text{ ต่อ 1 sample} \qquad V_{out} = \frac{\text{code}}{2^{N}-1}\,V_{FS}

n:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.2222em;">V</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3283em;"><span style="top:-2.55em;margin-left:-0.2222em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.1389em;">F</span><span class="mord mathnormal mtight" style="margin-right:0.0576em;">S</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> ของ codec — นี่คือ digital-to-analog ที่จับต้องได้จริง</p>
<blockquote>
<p>นี่คือ digital-to-analog ของจริง: ตัวเลขในหน่วยความจำกลายเป็นคลื่นแรงดันที่หูเราได้ยิน</p>
</blockquote>

<h2 id="%E0%B8%9F%E0%B8%B1%E0%B8%87%E0%B9%80%E0%B8%AA%E0%B8%B5%E0%B8%A2%E0%B8%87-snake-%E0%B8%88%E0%B8%A3%E0%B8%B4%E0%B8%87--gamesfxeat--%E0%B8%A5%E0%B8%B2%E0%B8%81%E0%B8%8B%E0%B8%B9%E0%B8%A1%E0%B8%A3%E0%B8%B9%E0%B8%9B%E0%B8%84%E0%B8%A5%E0%B8%B7%E0%B9%88%E0%B8%99">ฟังเสียง Snake จริง — <code>game.sfx(&quot;eat&quot;)</code> + ลากซูมรูปคลื่น</h2>
<p><code>game.sfx(&quot;eat&quot;)</code> ที่เราเรียกในคาบนี้ = เสียง <strong><code>snake_eat</code></strong> ด้านล่าง (square 659 Hz) สังเคราะห์ตรงจากตารางใน firmware — กดเลือก → <strong>เล่น</strong> → ลากแถบ <strong>ซูม</strong> ดูรูปคลื่นราย cycle → เทียบ <strong>spectrogram</strong></p>
<div id="sfxv" style="font-size:0.6em;background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px;margin-top:6px">
<div id="sfxbtns" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;align-items:center">
<span style="color:#7ee787;font-weight:600">Snake</span><button data-s="snake_eat">กิน</button><button data-s="snake_turn">เลี้ยว</button><button data-s="snake_die">ตาย</button>
<span style="color:#7ee787;font-weight:600;margin-left:8px">Flappy</span><button data-s="flappy_flap">กระพือ</button><button data-s="flappy_score">แต้ม</button><button data-s="flappy_die">ตาย</button>
<span style="color:#7ee787;font-weight:600;margin-left:8px">Pong</span><button data-s="pong_paddle">ไม้</button><button data-s="pong_wall">ขอบ</button><button data-s="pong_score">แต้ม</button><button data-s="pong_win">ชนะ</button><button data-s="pong_lose">แพ้</button>
<span style="color:#7ee787;font-weight:600;margin-left:8px">Shooter</span><button data-s="shoot_fire">ยิง</button><button data-s="shoot_hit">โดน</button><button data-s="shoot_explode">ระเบิด</button><button data-s="shoot_lose_life">เสียชีวิต</button>
<span style="color:#7ee787;font-weight:600;margin-left:8px">UI</span><button data-s="ui_start">เริ่ม</button><button data-s="ui_select">เลือก</button><button data-s="ui_move">เลื่อน</button><button data-s="ui_back">ย้อน</button><button data-s="ui_deny">ห้าม</button><button data-s="game_over">Game Over</button>
</div>
<div style="display:flex;gap:12px;align-items:center;margin-bottom:7px">
<button id="sfxpp" style="background:#4a90d9;color:#fff;border:0;border-radius:8px;padding:6px 16px;cursor:pointer">▶ เล่น</button>
<span>ซูม</span><input id="sfxz" type="range" min="1" max="100" value="60" style="flex:1" />
<b id="sfxlb" style="color:#19c8ff">snake_eat · square 659Hz</b>
</div>
<canvas id="sfxcv" style="width:100%;height:150px;background:#0d1117;border:1px solid #21262d;border-radius:6px;display:block"></canvas>
<div style="color:#8b949e;margin:6px 0 2px">spectrogram (ความถี่ ↕ · เวลา →):</div>
<img id="sfxsp" src="img/sfx_snake_eat_spec.png" style="width:100%;max-height:130px;object-fit:contain;background:#0d1117;border-radius:6px" />
</div>
<script src="img/sfx_samples.js"></script>
<script>
(function(){
var META={snake_eat:'square 659Hz',snake_turn:'triangle 330Hz',snake_die:'saw 523Hz',flappy_flap:'triangle 262Hz',flappy_score:'square 1319Hz',flappy_die:'saw 330Hz',pong_paddle:'square 659Hz',pong_wall:'square 392Hz',pong_score:'square 523Hz',pong_win:'square 523Hz · arp ↑',pong_lose:'saw 330Hz',shoot_fire:'saw 2637Hz กวาดลง',shoot_hit:'square 1047Hz',shoot_explode:'saw 131Hz',shoot_lose_life:'saw 196Hz',ui_start:'square 523Hz',ui_select:'square 1047Hz',ui_move:'square 1047Hz',ui_back:'square 784Hz',ui_deny:'saw 165Hz',game_over:'triangle 392Hz ลง'};
var box=document.getElementById('sfxv'); if(!box||box.dataset.i)return; box.dataset.i=1;
var cur='snake_eat', au=new Audio();
function draw(id,val){var s=(window.SFXSAMP||{})[id],per=(window.SFXPER||{})[id]||100,c=document.getElementById('sfxcv'); if(!s||!c)return;
 var dpr=window.devicePixelRatio||1,W=c.clientWidth||700,H=150; c.width=W*dpr; c.height=H*dpr;
 var ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,W,H);
 var cycles=Math.round(2+(100-val)/100*30),win=Math.max(40,Math.min(s.length,Math.round(cycles*per))),st=Math.floor((s.length-win)/2),A=H*0.36;
 ctx.strokeStyle='#21262d'; ctx.lineWidth=1; [H/2-A,H/2,H/2+A].forEach(function(y){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
 ctx.strokeStyle='#79c0ff'; ctx.lineWidth=1.8; ctx.beginPath();
 for(var i=0;i<win;i++){var x=i/(win-1)*W,y=H/2-(s[st+i]/120)*A; i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
 ctx.fillStyle='#8b949e'; ctx.font='12px sans-serif'; ctx.fillText('~'+cycles+' รอบคลื่น ('+(win/48).toFixed(1)+' ms)',10,18);}
function sel(id,play){cur=id; document.getElementById('sfxlb').textContent=id+' · '+(META[id]||''); document.getElementById('sfxsp').src='img/sfx_'+id+'_spec.png'; draw(id,+document.getElementById('sfxz').value); if(play){au.pause();au.src='img/sfx_'+id+'.mp3';au.currentTime=0;au.play();}}
box.querySelectorAll('button[data-s]').forEach(function(b){b.style.cssText='background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:4px 9px;cursor:pointer';b.addEventListener('click',function(){sel(b.getAttribute('data-s'),true);});});
document.getElementById('sfxpp').addEventListener('click',function(){if(au.paused){if(!au.src)au.src='img/sfx_'+cur+'.mp3'; au.play();}else{au.pause();}});
au.addEventListener('play',function(){document.getElementById('sfxpp').textContent='⏸ หยุด';});
au.addEventListener('pause',function(){document.getElementById('sfxpp').textContent='▶ เล่น';});
au.addEventListener('ended',function(){document.getElementById('sfxpp').textContent='▶ เล่น';});
document.getElementById('sfxz').addEventListener('input',function(e){draw(cur,+e.target.value);});
function init(){draw('snake_eat',60);}
if(window.SFXSAMP){init();}else{window.addEventListener('load',function(){setTimeout(init,150);});}
window.addEventListener('resize',function(){setTimeout(function(){draw(cur,+document.getElementById('sfxz').value);},120);});
})();
</script>
<blockquote>
<p>เสียงเกมอื่นก็มาจากตารางเดียวกัน — square ของ snake ฟังกระด้าง, saw ของยิงเลเซอร์ฟังคม · เครื่องมือเต็ม: <a href="img/sound_video_demo.html">sound_video_demo</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:default;" data-marpit-pagination-total="19">
<h2 id="%E0%B9%80%E0%B8%8A%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%A1%E0%B9%82%E0%B8%A2%E0%B8%87%E0%B8%A3%E0%B8%B2%E0%B8%81%E0%B8%90%E0%B8%B2%E0%B8%99--snake-%E0%B8%84%E0%B8%B2%E0%B8%9A%E0%B8%99%E0%B8%B5%E0%B9%89%E0%B9%81%E0%B8%95%E0%B8%B0%E0%B8%A7%E0%B8%B4%E0%B8%A8%E0%B8%A7%E0%B8%81%E0%B8%A3%E0%B8%A3%E0%B8%A1%E0%B8%AD%E0%B8%B0%E0%B9%84%E0%B8%A3%E0%B8%9A%E0%B9%89%E0%B8%B2%E0%B8%87">เชื่อมโยงรากฐาน — Snake คาบนี้แตะวิศวกรรมอะไรบ้าง</h2>
<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:0.86em">
<div style="flex:1;min-width:240px;border-left:5px solid #2196f3;background:#f3f8ff;border-radius:8px;padding:10px 12px">
<b>Python · โครงสร้างข้อมูล</b><br />
งู = list ที่เติมหัว/ตัดหางสองด้าน คือพฤติกรรมของ <b>deque</b> (double-ended queue) — โครงสร้างพื้นฐานที่ใช้ทั่วทั้งงานจริง เช่น คิวงาน, buffer
</div>
<div style="flex:1;min-width:240px;border-left:5px solid #ff9800;background:#fff8f0;border-radius:8px;padding:10px 12px">
<b>Algorithm</b><br />
"สุ่มจนกว่าจะว่าง" = <b>rejection sampling</b> · ต้นทุน <code>E = 1/(1-f)</code> · เลือกวิธีที่เร็วพอกับงานจริงบน MCU
</div>
<div style="flex:1;min-width:240px;border-left:5px solid #9c27b0;background:#faf4fc;border-radius:8px;padding:10px 12px">
<b>Embedded · เสียง</b><br />
<code>sfx("eat")</code> -&gt; PCM samples -&gt; <b>บัส I2S</b> -&gt; codec (DAC+amp) -&gt; ลำโพง คือสาย digital-to-analog ของจริงบน PSoC Edge E84
</div>
<div style="flex:1;min-width:240px;border-left:5px solid #4caf50;background:#f4fbf4;border-radius:8px;padding:10px 12px">
<b>Graphics · พิกัด</b><br />
เก็บโลกเป็น "ช่อง" <code>[col,row]</code> แล้วคูณ <code>CELL_PX</code> ตอนวาด คือ <b>coordinate transform</b> grid -&gt; pixel ที่เอนจินเกมทุกตัวใช้
</div>
</div>
<svg viewBox="0 0 760 200" width="640" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  
  <line x1="380" y1="100" x2="150" y2="44"  stroke="#2196f3" stroke-width="2.4" />

<h2 id="%E0%B8%81%E0%B8%B1%E0%B8%9A%E0%B8%94%E0%B8%B1%E0%B8%81%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%80%E0%B8%88%E0%B8%AD%E0%B8%9A%E0%B9%88%E0%B8%AD%E0%B8%A2">กับดักที่เจอบ่อย</h2>
<div style="font-size:0.88em">
<table>
<thead>
<tr>
<th>อาการ</th>
<th>สาเหตุ</th>
<th>แก้</th>
</tr>
</thead>
<tbody>
<tr>
<td>กินแล้วไม่โต / งูสั้นลง</td>
<td>ลืม — ตอนกินต้อง <strong>ไม่</strong> <code>pop()</code></td>
<td>grow = insert หัว ไม่ตัดหาง</td>
</tr>
<tr>
<td><code>name 'score' is not defined</code></td>
<td>ลืม <code>global ..., score</code></td>
<td>เติมใน global ต้นฟังก์ชัน</td>
</tr>
<tr>
<td>กินไม่ติดทั้งที่กล่องทับ</td>
<td>เทียบผิดหน่วย (พิกเซล vs ช่อง)</td>
<td>เทียบช่อง <code>x // CELL_PX</code></td>
</tr>
<tr>
<td>อาหารโผล่นอกจอ</td>
<td>สุ่มพิกเซลแทนช่อง</td>
<td>สุ่ม <code>0..GRID-1</code> แล้วคูณ</td>
</tr>
<tr>
<td>อาหารทับตัวงู</td>
<td>ลืม <code>if [c,r] not in snake_body</code></td>
<td>ใส่เงื่อนไขใน <code>while True</code></td>
</tr>
<tr>
<td>ไม่ได้ยินเสียง</td>
<td><code>sfx</code> ดังจริงเฉพาะ <strong>บนบอร์ด</strong></td>
<td>กด Program to Device แล้วฟังที่บอร์ด</td>
</tr>
</tbody>
</table>
</div>

<h2 id="%E0%B8%AA%E0%B8%A3%E0%B8%B8%E0%B8%9B--%E0%B8%97%E0%B8%B3%E0%B9%80%E0%B8%AD%E0%B8%87-30">สรุป + ทำเอง 30%</h2>
<div style="display:flex;gap:24px">
<div style="flex:1;font-size:0.9em">
<p><strong>เช็คผ่าน (Acceptance)</strong></p>
<ul>
<li>[ ] อาหารโผล่ + <strong>ไม่เคยทับตัวงู</strong></li>
<li>[ ] งับอาหาร → <strong>ยาว +1 ปล้อง</strong> ทันที</li>
<li>[ ] กิน → <strong>Score +1</strong> + เสียง <code>&quot;eat&quot;</code></li>
<li>[ ] กิน → อาหารสุ่มช่องใหม่ทุกครั้ง</li>
<li>[ ] เดินปกติ → ยาวเท่าเดิม (ตัดหางถูก)</li>
</ul>
</div>
<div style="flex:1;font-size:0.9em">
<p><strong>งาน 30% ของน้อง ๆ คาบนี้</strong><br />
ใน <a class="pc-gh-link" href="https://github.com/Advance-Innovation-Centre-AIC/embedded-systems-for-developer/blob/main/developer-ii/practise_codes/snake_step3.py" target="_blank" rel="noopener" title="เปิดไฟล์บน GitHub (แท็บใหม่)" style="text-decoration:none"><code>practise_codes/snake_step3.py</code><sup style="color:#22d3ee;font-weight:800">&#8599;</sup></a> มีช่อง TODO ให้เติมเอง:</p>
<ul>
<li>เช็ค <code>ate_food</code> (เทียบช่อง ไม่ใช่พิกเซล)</li>
<li>ถ้ากิน: <code>score += 1</code> · <code>game.sfx(&quot;eat&quot;)</code> · <code>score_text.set(...)</code> · ต่อปล้อง · วางอาหารใหม่</li>
<li>ถ้าไม่กิน: <code>snake_body.pop()</code></li>
</ul>
<p><strong>ลองต่อยอด (ทำได้ก็ดี)</strong></p>
<ul>
<li>Score ถึง 5 แล้วเร่ง <code>fps</code> ให้เร็วขึ้น</li>
<li>เปลี่ยนข้อความ <code>&quot;Nice bite!&quot;</code> เป็นคำของตัวเอง</li>
</ul>
</div>
</div>
